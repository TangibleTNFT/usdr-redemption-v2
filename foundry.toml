[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
# Polygon PoS supports EIP-1153 (transient storage, used by ReentrancyGuardTransient) since
# the Napoli upgrade. Pin Cancun so the build never emits post-Cancun opcodes the target may
# not support; the toolchain default would otherwise resolve to a newer EVM version.
evm_version = "cancun"
optimizer = true
optimizer_runs = 1000

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
