[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
# Polygon PoS supports EIP-1153 (transient storage, used by ReentrancyGuardTransient) since
# the Napoli upgrade. Pin Cancun so the build never emits post-Cancun opcodes the target may
# not support; the toolchain default would otherwise resolve to a newer EVM version.
evm_version = "cancun"
optimizer = true
optimizer_runs = 1000

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# The deploy script records the deployed address under ./deployments for operational reference.
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Polygonscan verification for `forge script ... --verify`. The key is read from the
# environment so no secret lands in the repo. Get one at https://etherscan.io/myapikey
# (Etherscan's multichain key covers Polygon, chain 137).
[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}", chain = 137 }

[invariant]
runs = 64
depth = 128
fail_on_revert = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
