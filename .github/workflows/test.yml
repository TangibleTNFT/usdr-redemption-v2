name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        # Fork tests pin a Polygon block and need an archive node; the public RPC used in
        # CI is pruned and cannot serve state at the pinned block. Run them locally with
        # POLYGON_RPC_URL set instead.
        run: forge test -vvv --no-match-path 'test/fork/*'
